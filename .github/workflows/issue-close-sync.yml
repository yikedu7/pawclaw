name: Issue Close → Dependency Sync

on:
  issues:
    types: [closed]

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Remove stale blocker references
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: --allowedTools "Bash"
          prompt: |
            Issue #${{ github.event.issue.number }} ("${{ github.event.issue.title }}") was just closed.

            1. List all open issues that reference #${{ github.event.issue.number }} in their body:
               gh issue list --repo ${{ github.repository }} --state open --limit 100 --json number,title,body \
                 | jq '[.[] | select(.body | test("#${{ github.event.issue.number }}[^0-9]"))]'

            2. For each matching issue, check if #${{ github.event.issue.number }} appears in a "Blocked By" or "Depends On" section.

            3. If it does:
               - Edit the issue body to mark it as resolved:
                 Replace the raw reference (e.g. "- #${{ github.event.issue.number }} (some description)")
                 with "- #${{ github.event.issue.number }} (✅ closed)"
               - If it was the ONLY remaining item in "Blocked By", also remove the "blocked" label:
                 gh issue edit <N> --repo ${{ github.repository }} --remove-label "blocked"
               - Add a comment:
                 gh issue comment <N> --repo ${{ github.repository }} \
                   --body "Dependency #${{ github.event.issue.number }} closed. Updated blockers list."

            4. If no open issues reference it, do nothing.
