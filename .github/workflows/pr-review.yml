name: PR Review Team

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run PR Review Team
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          additional_permissions: |
            Bash(gh issue view:*)
            Bash(gh issue list:*)
            Bash(gh pr view:*)
          prompt: |
            You are a PR review team for the x-pet project. Review this PR against the engineering principles in CLAUDE.md.

            Before starting:
            1. Read CLAUDE.md and docs/architecture.md
            2. Run `gh pr view $PR_NUMBER --json number,title,body` to read the PR title and description
            3. Run `gh issue view <N>` to read the actual issue scope (extract issue number from PR title/body or first commit)
            4. Use `git log origin/main...HEAD --oneline` to see commits, `git diff origin/main...HEAD` to see changes

            Run three focused reviews in sequence:

            ## Reviewer 1 — Ownership & Scope
            - Run `gh issue view <N>` and check: does this PR only touch files relevant to that issue's scope?
            - Does it bundle unrelated changes?
            - Is there a `closes #N` reference in the PR title, PR description, or the FIRST commit? Subsequent commits in the same PR do NOT need to repeat it — do not flag this as a violation.

            ## Reviewer 2 — Architecture & Contracts
            - Do imports follow the layer order: shared → db → api → runtime → ws?
            - Does the implementation match the API contracts in docs/api-contracts.md (if relevant)?
            - Are all external inputs validated with Zod schemas from @x-pet/shared?
            - No hand-rolled types that duplicate packages/shared/types/?

            ## Reviewer 3 — Engineering Principles
            - Does this implement exactly what the issue asked — no more, no less?
            - Any gold-plating (unrequested features, speculative abstractions, premature helpers)?
            - New blockers discovered? Should they be in docs/risks.md?
            - No console.log (use structured logger)?

            For each reviewer, output: ✅ PASS or ❌ FAIL with specific line references.
            End with an overall APPROVE or REQUEST CHANGES verdict and a one-paragraph summary.
