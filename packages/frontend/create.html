<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PawClaw — create</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        font-family: 'Press Start 2P', monospace;
        color: #5c4033;
      }
      #bg-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
      }
      #bg-canvas canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
      .overlay {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-y: auto;
        padding: 1rem;
      }
      .card {
        background: rgba(255, 251, 240, 0.88);
        border: 3px solid #c8a96e;
        border-radius: 8px;
        padding: 2rem;
        width: min(440px, 96vw);
        box-shadow: 4px 4px 0 #c8a96e;
        backdrop-filter: blur(2px);
      }
      h1 {
        font-size: 1rem;
        text-align: center;
        margin-bottom: 1.5rem;
        color: #7b5e3a;
        letter-spacing: 0.05em;
      }
      label {
        display: block;
        font-size: 0.45rem;
        margin-bottom: 0.3rem;
        margin-top: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      input, textarea {
        width: 100%;
        background: #fef9ee;
        border: 2px solid #c8a96e;
        border-radius: 4px;
        padding: 0.5rem 0.6rem;
        font-family: 'Press Start 2P', monospace;
        font-size: 0.55rem;
        color: #5c4033;
        outline: none;
      }
      input:focus, textarea:focus {
        border-color: #a0703a;
      }
      textarea { resize: vertical; min-height: 80px; }
      .toggle {
        text-align: center;
        margin-top: 1.2rem;
        font-size: 0.45rem;
      }
      .toggle button {
        background: none;
        border: none;
        color: #a0703a;
        font-family: 'Press Start 2P', monospace;
        font-size: 0.45rem;
        cursor: pointer;
        text-decoration: underline;
      }
      button.submit {
        display: block;
        width: 100%;
        margin-top: 1.4rem;
        padding: 0.75rem;
        background: #a0703a;
        color: #fdf6e3;
        border: none;
        border-radius: 4px;
        font-family: 'Press Start 2P', monospace;
        font-size: 0.6rem;
        cursor: pointer;
        box-shadow: 3px 3px 0 #7b5e3a;
        transition: transform 0.1s, box-shadow 0.1s;
      }
      button.submit:active {
        transform: translate(2px, 2px);
        box-shadow: 1px 1px 0 #7b5e3a;
      }
      button.submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #error-msg {
        margin-top: 0.8rem;
        font-size: 0.45rem;
        color: #c0392b;
        text-align: center;
        min-height: 1rem;
      }
      .pet-fields { display: none; }
      .color-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.4rem;
        flex-wrap: wrap;
      }
      .swatch {
        width: 28px;
        height: 28px;
        border-radius: 4px;
        border: 2px solid #c8a96e;
        cursor: pointer;
        flex-shrink: 0;
        transition: border-color 0.1s;
      }
      .swatch.selected, .swatch:hover {
        border-color: #5c4033;
      }
      #color-custom {
        width: 28px;
        height: 28px;
        border: 2px solid #c8a96e;
        border-radius: 4px;
        padding: 0;
        cursor: pointer;
        background: none;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="bg-canvas"></div>
    <div class="overlay">
    <div class="card">
      <h1>PawClaw</h1>

      <!-- Auth section -->
      <div id="auth-section">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />

        <button class="submit" id="auth-btn">Sign In</button>
        <div class="toggle">
          <span id="toggle-label">No account?</span>
          <button id="toggle-btn">Sign Up</button>
        </div>
        <div id="error-msg"></div>
      </div>

      <!-- Pet creation section (shown after auth) -->
      <div class="pet-fields" id="pet-section">
        <label for="pet-name">Pet Name</label>
        <input id="pet-name" type="text" maxlength="32" placeholder="Pixel" />

        <label for="soul-prompt">Soul Prompt</label>
        <textarea id="soul-prompt" placeholder="Describe your pet's personality…"></textarea>

        <label>Pet Color</label>
        <div class="color-row">
          <div class="swatch selected" id="swatch-white"  data-color="#ffffff" style="background:#ffffff;" title="Original"></div>
          <div class="swatch"          id="swatch-lavender" data-color="#ddccff" style="background:#ddccff;" title="Lavender"></div>
          <div class="swatch"          id="swatch-ash"    data-color="#d0d0d0" style="background:#d0d0d0;" title="Ash"></div>
          <input type="color" id="color-custom" value="#ffffff" title="Custom color" />
        </div>

        <button class="submit" id="create-btn">Create Pet</button>
        <div id="error-msg-pet"></div>
      </div>
    </div>
    </div><!-- .overlay -->

    <script type="module" src="/src/create/bg.ts"></script>
    <script type="module" src="/src/create/main.ts"></script>
  </body>
</html>
